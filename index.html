<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Примерка цвета губ — Makeup Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:    #FF6AD5;
      --accent-dk: #C840AA;
      --glass-bg:  rgba(255,255,255,0.08);
      --glass-bd:  rgba(255,255,255,0.15);
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(150deg, #3A1068 0%, #8E38B0 50%, #DF80BE 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      justify-content: center;
      padding: 20px 16px 32px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 4px 0 2px;
    }
    .header-logo {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      line-height: 1.2;
    }
    .header h1 em { color: var(--accent); font-style: italic; }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-bd);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      color: rgba(255,255,255,0.55);
      border: none;
      background: transparent;
      font-family: inherit;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent-dk), var(--accent));
      color: #fff;
      box-shadow: 0 0 16px rgba(255,106,213,.4);
    }

    /* Glass card */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-bd);
      border-radius: 20px;
    }

    /* Viewport */
    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
    }
    .viewport video,
    .viewport canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .viewport canvas { z-index: 2; }

    /* Photo mode */
    .photo-area {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.5);
      z-index: 1;
    }
    .photo-placeholder span { font-size: 40px; }
    .photo-placeholder p { font-size: 13px; }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-dk), var(--accent));
      color: #fff;
      border: none;
      font-family: inherit;
      box-shadow: 0 0 20px rgba(255,106,213,.35);
      transition: transform .15s;
    }
    .upload-btn:active { transform: scale(0.97); }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(30,0,60,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      border-radius: 20px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,106,213,.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 13px; color: rgba(255,255,255,.7); }

    /* Controls */
    .controls { padding: 18px; display: flex; flex-direction: column; gap: 16px; }

    .controls-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-bottom: 4px;
    }

    /* Color presets */
    .presets-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .preset-dot {
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .15s, border-color .15s;
      flex-shrink: 0;
    }
    .preset-dot.active {
      border-color: #fff;
      transform: scale(1.15);
    }
    .color-input-wrap {
      width: 30px; height: 30px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,.3);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
    }
    .color-input-wrap input[type=color] {
      position: absolute;
      inset: -4px;
      width: calc(100% + 8px);
      height: calc(100% + 8px);
      border: none;
      cursor: pointer;
      opacity: 0;
    }
    .color-input-wrap::after {
      content: '+';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: rgba(255,255,255,.7);
      pointer-events: none;
    }

    /* Sliders */
    .slider-row { display: flex; flex-direction: column; gap: 8px; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; }
    .slider-val { font-size: 12px; font-weight: 600; color: var(--accent); }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.15);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-dk), var(--accent));
      box-shadow: 0 0 8px rgba(255,106,213,.5);
      cursor: pointer;
    }

    /* Error banner */
    .error-banner {
      background: rgba(255,80,80,.12);
      border: 1px solid rgba(255,80,80,.3);
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      color: rgba(255,200,200,.9);
      display: none;
    }
    .error-banner.show { display: block; }

    /* Info banner */
    .info-banner {
      background: rgba(255,106,213,.08);
      border: 1px solid rgba(255,106,213,.2);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 12px;
      color: rgba(255,255,255,.6);
      text-align: center;
      display: none;
    }
    .info-banner.show { display: block; }

    /* CTA */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-dk), var(--accent));
      box-shadow: 0 0 30px rgba(255,106,213,.5);
      transition: transform .15s, box-shadow .15s;
    }
    .cta-btn:active { transform: scale(0.98); box-shadow: 0 0 15px rgba(255,106,213,.3); }
    .cta-arrow { font-size: 18px; }

    .hidden { display: none !important; }

    /* Detect hint */
    .detect-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px;
      color: rgba(255,255,255,.7);
      white-space: nowrap;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">✦ Makeup Kitchen ✦</div>
    <h1>Примерь свой<br><em>цвет губ</em></h1>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-camera" onclick="switchTab('camera')">📷 Камера</button>
    <button class="tab" id="tab-photo" onclick="switchTab('photo')">🖼 Фото</button>
  </div>

  <!-- Camera mode -->
  <div id="section-camera">
    <div class="viewport glass" id="camera-viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div class="loading-overlay" id="camera-loading">
        <div class="spinner"></div>
        <p>Загружаем модель...</p>
      </div>
      <div class="detect-hint" id="detect-hint">Направь камеру на лицо</div>
    </div>
  </div>

  <!-- Photo mode -->
  <div id="section-photo" class="hidden">
    <div class="photo-area glass" id="photo-area">
      <canvas id="photo-canvas" class="hidden"></canvas>
      <div class="photo-placeholder" id="photo-placeholder">
        <span>💄</span>
        <p>Загрузи фото для примерки</p>
      </div>
    </div>
    <div style="margin-top:12px; text-align:center;">
      <label class="upload-btn" for="file-input">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0L8 8m4-4l4 4"/></svg>
        Выбрать фото
      </label>
      <input type="file" id="file-input" accept="image/*" capture="user" style="display:none" />
    </div>
    <div class="loading-overlay hidden" id="photo-loading" style="position:relative;aspect-ratio:unset;height:60px;border-radius:14px;margin-top:8px;">
      <div class="spinner"></div>
      <p>Анализируем...</p>
    </div>
  </div>

  <!-- Errors -->
  <div class="error-banner" id="error-banner"></div>
  <div class="info-banner" id="info-banner"></div>

  <!-- Controls -->
  <div class="glass controls">
    <!-- Color presets -->
    <div>
      <div class="controls-label">Выбери цвет</div>
      <div class="presets-row" id="presets-row">
        <!-- dots rendered by JS -->
        <div class="color-input-wrap" title="Свой цвет">
          <input type="color" id="custom-color" value="#B84040" />
        </div>
      </div>
    </div>

    <!-- Intensity -->
    <div class="slider-row">
      <div class="slider-header">
        <div class="controls-label" style="margin-bottom:0">Интенсивность</div>
        <span class="slider-val" id="opacity-val">60%</span>
      </div>
      <input type="range" id="opacity-slider" min="20" max="90" step="5" value="60" />
    </div>

    <!-- Gloss -->
    <div class="slider-row">
      <div class="slider-header">
        <div class="controls-label" style="margin-bottom:0">Блеск</div>
        <span class="slider-val" id="gloss-val">30%</span>
      </div>
      <input type="range" id="gloss-slider" min="0" max="100" step="5" value="30" />
    </div>
  </div>

  <!-- CTA -->
  <a class="cta-btn" href="https://b918851.yclients.com/company/167253/record-type?" target="_blank" rel="noopener">
    Записаться на макияж
    <span class="cta-arrow">→</span>
  </a>

</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ─── Lip landmark indices (MediaPipe 478-point mesh) ───
const OUTER = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
const INNER = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];

const PRESETS = [
  '#C8A882','#D4856A','#C4624A','#B84040',
  '#8B2252','#6B1F3A','#E8758A','#FF6AD5',
  '#C840AA','#D4506B','#9B3060','#5C1F3A',
];

// ─── State ───
const state = {
  color:   '#B84040',
  opacity: 0.6,
  gloss:   0.3,
  mode:    'camera',
  lastLandmarks: null,
  frameCount: 0,
  detecting: false,
};

// ─── DOM refs ───
const video         = document.getElementById('video');
const camCanvas     = document.getElementById('camera-canvas');
const camCtx        = camCanvas.getContext('2d');
const photoCanvas   = document.getElementById('photo-canvas');
const photoCtx      = photoCanvas.getContext('2d');
const opacitySlider = document.getElementById('opacity-slider');
const glossSlider   = document.getElementById('gloss-slider');
const opacityVal    = document.getElementById('opacity-val');
const glossVal      = document.getElementById('gloss-val');
const customColor   = document.getElementById('custom-color');
const fileInput     = document.getElementById('file-input');
const errorBanner   = document.getElementById('error-banner');
const infoBanner    = document.getElementById('info-banner');
const camLoading    = document.getElementById('camera-loading');
const photoLoading  = document.getElementById('photo-loading');
const detectHint    = document.getElementById('detect-hint');
const photoArea     = document.getElementById('photo-area');
const photoPlaceholder = document.getElementById('photo-placeholder');

// ─── Build color presets ───
const presetsRow = document.getElementById('presets-row');
const colorWrap  = presetsRow.querySelector('.color-input-wrap');
PRESETS.forEach(hex => {
  const dot = document.createElement('div');
  dot.className = 'preset-dot';
  dot.style.background = hex;
  dot.title = hex;
  dot.onclick = () => selectColor(hex, dot);
  presetsRow.insertBefore(dot, colorWrap);
});
// Mark default preset active
const defaultDot = presetsRow.querySelector(`.preset-dot[title="${state.color}"]`);
if (defaultDot) defaultDot.classList.add('active');

function selectColor(hex, dot) {
  state.color = hex;
  customColor.value = hex;
  presetsRow.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
  if (dot) dot.classList.add('active');
  if (state.mode === 'photo') redrawPhoto();
}

customColor.addEventListener('input', () => {
  state.color = customColor.value;
  presetsRow.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
  if (state.mode === 'photo') redrawPhoto();
});

opacitySlider.addEventListener('input', () => {
  state.opacity = opacitySlider.value / 100;
  opacityVal.textContent = opacitySlider.value + '%';
  if (state.mode === 'photo') redrawPhoto();
});

glossSlider.addEventListener('input', () => {
  state.gloss = glossSlider.value / 100;
  glossVal.textContent = glossSlider.value + '%';
  if (state.mode === 'photo') redrawPhoto();
});

// ─── MediaPipe init ───
let faceLandmarker = null;

async function initMediaPipe() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numFaces: 1,
      minFaceDetectionConfidence: 0.5,
      minFacePresenceConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    return true;
  } catch (e) {
    console.error('MediaPipe init error:', e);
    showError('Не удалось загрузить модель обнаружения лица. Проверьте подключение к интернету.');
    return false;
  }
}

// ─── Camera ───
async function startCamera() {
  camLoading.classList.remove('hidden');

  const ok = await initMediaPipe();
  if (!ok) { camLoading.classList.add('hidden'); return; }

  if (!location.protocol.startsWith('https') && location.hostname !== 'localhost') {
    camLoading.classList.add('hidden');
    showError('Камера требует HTTPS. Используй режим «Фото» или открой страницу через защищённое соединение.');
    switchTab('photo');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 854 } }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    camCanvas.width  = video.videoWidth;
    camCanvas.height = video.videoHeight;
    camLoading.classList.add('hidden');
    requestAnimationFrame(cameraLoop);
  } catch (e) {
    camLoading.classList.add('hidden');
    showError('Камера недоступна или доступ запрещён. Используй режим «Фото».');
    switchTab('photo');
  }
}

function cameraLoop(ts) {
  if (state.mode !== 'camera') return;
  requestAnimationFrame(cameraLoop);

  const w = camCanvas.width, h = camCanvas.height;
  camCtx.clearRect(0, 0, w, h);

  // Mirror video (selfie)
  camCtx.save();
  camCtx.scale(-1, 1);
  camCtx.drawImage(video, -w, 0, w, h);
  camCtx.restore();

  state.frameCount++;

  // Detect every 3 frames
  if (state.frameCount % 3 === 0 && faceLandmarker && !state.detecting) {
    state.detecting = true;
    try {
      const result = faceLandmarker.detectForVideo(video, ts);
      if (result.faceLandmarks && result.faceLandmarks.length > 0) {
        // Mirror X coordinates
        state.lastLandmarks = result.faceLandmarks[0].map(pt => ({
          x: 1 - pt.x, y: pt.y, z: pt.z
        }));
        detectHint.style.display = 'none';
      } else {
        detectHint.style.display = 'block';
      }
    } catch {}
    state.detecting = false;
  }

  if (state.lastLandmarks) {
    drawLipColor(camCtx, state.lastLandmarks, w, h);
  }
}

// ─── Photo mode ───
let photoImage = null;

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  photoLoading.classList.remove('hidden');
  photoPlaceholder.style.display = 'none';
  photoCanvas.classList.add('hidden');

  photoImage = await loadImage(file);

  // Switch landmarker to IMAGE mode
  if (!faceLandmarker) {
    const ok = await initMediaPipeImage();
    if (!ok) { photoLoading.classList.add('hidden'); return; }
  } else {
    try {
      await faceLandmarker.setOptions({ runningMode: 'IMAGE' });
    } catch {}
  }

  // Size canvas to image
  const maxW = photoArea.clientWidth;
  const scale = Math.min(maxW / photoImage.width, 1);
  photoCanvas.width  = photoImage.width  * scale;
  photoCanvas.height = photoImage.height * scale;

  try {
    const result = faceLandmarker.detect(photoImage);
    if (result.faceLandmarks && result.faceLandmarks.length > 0) {
      state.lastPhotoLandmarks = result.faceLandmarks[0];
      redrawPhoto();
      photoCanvas.classList.remove('hidden');
    } else {
      showError('Лицо не обнаружено. Попробуй другое фото с хорошим освещением.');
      photoPlaceholder.style.display = 'flex';
    }
  } catch (e) {
    showError('Ошибка при обработке фото: ' + e.message);
    photoPlaceholder.style.display = 'flex';
  }

  photoLoading.classList.add('hidden');

  // Switch back to VIDEO mode for camera
  try { await faceLandmarker.setOptions({ runningMode: 'VIDEO' }); } catch {}
});

function redrawPhoto() {
  if (!photoImage || !state.lastPhotoLandmarks) return;
  photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
  photoCtx.drawImage(photoImage, 0, 0, photoCanvas.width, photoCanvas.height);
  drawLipColor(photoCtx, state.lastPhotoLandmarks, photoCanvas.width, photoCanvas.height);
}

async function initMediaPipeImage() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'IMAGE',
      numFaces: 1,
    });
    return true;
  } catch {
    showError('Не удалось загрузить модель. Проверьте подключение.');
    return false;
  }
}

function loadImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

// ─── Draw lip color ───
function drawLipColor(ctx, landmarks, w, h) {
  ctx.save();

  const path = new Path2D();

  // Outer contour
  OUTER.forEach((idx, i) => {
    const pt = landmarks[idx];
    const x = pt.x * w, y = pt.y * h;
    i === 0 ? path.moveTo(x, y) : path.lineTo(x, y);
  });
  path.closePath();

  // Inner contour (mouth opening — subtracted via evenodd)
  INNER.forEach((idx, i) => {
    const pt = landmarks[idx];
    const x = pt.x * w, y = pt.y * h;
    i === 0 ? path.moveTo(x, y) : path.lineTo(x, y);
  });
  path.closePath();

  ctx.clip(path, 'evenodd');

  // Color layer — multiply preserves lip texture
  ctx.globalCompositeOperation = 'multiply';
  ctx.globalAlpha = state.opacity;
  ctx.fillStyle = state.color;
  ctx.fillRect(0, 0, w, h);

  // Gloss highlight — radial gradient at cupid's bow
  if (state.gloss > 0.02) {
    const cx = landmarks[13].x * w;
    const cy = (landmarks[13].y * h) - 3;
    const r  = Math.max(w, h) * 0.04;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy + r * 0.5, r * 2.5);
    grad.addColorStop(0, `rgba(255,255,255,${state.gloss * 0.75})`);
    grad.addColorStop(0.5, `rgba(255,255,255,${state.gloss * 0.2})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 1;
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  ctx.restore();
}

// ─── Tab switching ───
window.switchTab = function(mode) {
  state.mode = mode;
  document.getElementById('tab-camera').classList.toggle('active', mode === 'camera');
  document.getElementById('tab-photo').classList.toggle('active', mode === 'photo');
  document.getElementById('section-camera').classList.toggle('hidden', mode !== 'camera');
  document.getElementById('section-photo').classList.toggle('hidden', mode !== 'photo');
  clearError();

  if (mode === 'camera' && !video.srcObject) {
    startCamera();
  }
};

// ─── Helpers ───
function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('show');
}
function clearError() {
  errorBanner.classList.remove('show');
}

// ─── Init ───
startCamera();
</script>
