<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Примерка цвета губ — Makeup Kitchen</title>
  <!-- cache bust: v7 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:     #3c0e2c;
      --accent:    #cf66ab;
      --accent-lt: #ffb9e7;
      --bg:        #fff5f5;
      --bg2:       #ffe8f7;
      --card-bg:   #ffffff;
      --card-bd:   #f0d6e8;
      --text:      #3c0e2c;
      --text-muted:#ac799a;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 40px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }


    /* Header */
    .header {
      text-align: center;
      padding: 4px 0 6px;
    }
    .header-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 26px;
      font-weight: 300;
      line-height: 1.25;
      color: var(--brand);
    }
    .header h1 em { color: var(--accent); font-style: normal; font-weight: 600; }

    /* Tabs */
    .tabs {
      display: flex;
      background: #fff;
      border: 1.5px solid var(--card-bd);
      border-radius: 50px;
      padding: 4px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px 0;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      color: var(--text-muted);
      border: none;
      background: transparent;
      font-family: 'Manrope', sans-serif;
    }
    .tab.active {
      background: var(--brand);
      color: #fff;
    }

    /* Card */
    .glass {
      background: var(--card-bg);
      border: 1.5px solid var(--card-bd);
      border-radius: 20px;
    }

    /* Viewport */
    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      background: #f0d6e8;
    }
    .viewport video,
    .viewport canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .viewport canvas { z-index: 2; }

    /* Photo mode */
    .photo-area {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 20px;
      overflow: hidden;
      background: #f0d6e8;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-area canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      z-index: 1;
    }
    .photo-placeholder span { font-size: 40px; }
    .photo-placeholder p { font-size: 13px; }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--brand);
      color: #fff;
      border: none;
      font-family: 'Manrope', sans-serif;
      transition: opacity .15s, transform .15s;
    }
    .upload-btn:active { transform: scale(0.97); opacity: .88; }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,245,245,0.75);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
      border-radius: 20px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--card-bd);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 13px; color: var(--text-muted); }

    /* Controls */
    .controls { padding: 18px; display: flex; flex-direction: column; gap: 18px; }

    .controls-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    /* Color presets */
    .presets-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
    }
    .preset-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform .15s, border-color .15s, box-shadow .15s;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(60,14,44,.15);
    }
    .preset-dot.active {
      border-color: var(--brand);
      transform: scale(1.18);
      box-shadow: 0 0 0 3px rgba(60,14,44,.12);
    }

    /* Custom HSL color picker */
    .color-picker-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .picker-preview-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .picker-preview-swatch {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 2.5px solid var(--card-bd);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(60,14,44,.15);
    }
    .picker-hex {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      font-family: 'Montserrat', monospace;
      letter-spacing: 1px;
    }
    /* SL square */
    #sl-canvas {
      width: 100%;
      height: 160px;
      border-radius: 12px;
      cursor: crosshair;
      touch-action: none;
      display: block;
      border: 1px solid var(--card-bd);
    }
    /* Hue strip */
    #hue-canvas {
      width: 100%;
      height: 22px;
      border-radius: 11px;
      cursor: crosshair;
      touch-action: none;
      display: block;
      border: 1px solid var(--card-bd);
    }

    /* Sliders */
    .slider-row { display: flex; flex-direction: column; gap: 8px; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; }
    .slider-val { font-size: 12px; font-weight: 700; color: var(--accent); font-family: 'Montserrat', sans-serif; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--card-bd);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 2px 6px rgba(60,14,44,.25);
      cursor: pointer;
      border: 2px solid #fff;
    }

    /* Error banner */
    .error-banner {
      background: #fff0f0;
      border: 1.5px solid #f5c0c0;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 13px;
      color: #a03030;
      display: none;
    }
    .error-banner.show { display: block; }

    /* Info banner */
    .info-banner {
      background: #ffeef9;
      border: 1.5px solid var(--card-bd);
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      display: none;
    }
    .info-banner.show { display: block; }

    /* CTA */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 16px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: var(--brand);
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.5px;
      transition: opacity .15s, transform .15s;
    }
    .cta-btn:active { transform: scale(0.98); opacity: .88; }
    .cta-btn-inner  { display: none; }
    .cta-arrow { font-size: 18px; }

    .hidden { display: none !important; }

    /* Detect hint */
    /* Selfie button */
    .selfie-btn {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 6;
      background: rgba(255,255,255,0.92);
      border: none;
      border-radius: 50px;
      padding: 9px 18px;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(60,14,44,.2);
      transition: transform .15s, opacity .15s;
    }
    .selfie-btn:active { transform: scale(0.95); }
    .selfie-btn:disabled { opacity: .5; cursor: default; }

    /* Flash effect */
    @keyframes flash { 0%,100%{opacity:0} 50%{opacity:1} }
    .flash-overlay {
      position: fixed; inset: 0; background: #fff;
      pointer-events: none; z-index: 999;
      animation: flash .35s ease forwards;
    }

    .detect-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(60,14,44,.6);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 11px;
      color: rgba(255,255,255,.85);
      white-space: nowrap;
      z-index: 5;
      pointer-events: none;
    }

    /* Desktop: two-column layout — must be LAST to override global styles */
    @media (min-width: 768px) {
      body { padding: 40px 32px 48px; align-items: flex-start; }

      .app {
        max-width: 960px;
        display: grid;
        grid-template-columns: 1fr 380px;
        grid-template-rows: auto auto 1fr auto auto;
        gap: 16px 24px;
        align-items: start;
      }

      .header        { grid-column: 1 / -1; grid-row: 1; text-align: center; padding: 0; justify-content: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .header h1     { font-size: 34px; }
      .header-logo   { font-size: 11px; margin-bottom: 0; }

      .tabs           { grid-column: 1; grid-row: 2; }

      #section-camera,
      #section-photo  { grid-column: 1; grid-row: 3; }
      .glass.controls { grid-column: 2; grid-row: 2 / 4; }

      .error-banner,
      .info-banner    { grid-column: 1; grid-row: 4; }

      /* CTA: mobile button hidden, inner (desktop) button shown */
      .cta-btn        { display: none; }
      .cta-btn-inner  { display: flex !important; }

      .viewport, .photo-area { aspect-ratio: 4/5; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">Makeup Kitchen</div>
    <h1>Примерь свой<br><em>цвет губ</em></h1>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-camera" onclick="switchTab('camera')">📷 Камера</button>
    <button class="tab" id="tab-photo" onclick="switchTab('photo')">🖼 Фото</button>
  </div>

  <!-- Camera mode -->
  <div id="section-camera">
    <div class="viewport glass" id="camera-viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="camera-canvas"></canvas>
      <div class="loading-overlay" id="camera-loading">
        <div class="spinner"></div>
        <p>Загружаем модель...</p>
      </div>
      <div class="detect-hint" id="detect-hint">Направь камеру на лицо</div>
      <!-- Selfie button -->
      <button class="selfie-btn" id="selfie-btn" onclick="takeSelfie()">📸 Селфи</button>
    </div>
  </div>

  <!-- Photo mode -->
  <div id="section-photo" class="hidden">
    <div class="photo-area glass" id="photo-area">
      <canvas id="photo-canvas" class="hidden"></canvas>

    </div>
    <div style="margin-top:12px; text-align:center;">
      <label class="upload-btn" for="file-input">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 12V4m0 0L8 8m4-4l4 4"/></svg>
        Выбрать фото
      </label>
      <input type="file" id="file-input" accept="image/*" capture="user" style="display:none" />
    </div>
    <div class="loading-overlay hidden" id="photo-loading" style="position:relative;aspect-ratio:unset;height:60px;border-radius:14px;margin-top:8px;">
      <div class="spinner"></div>
      <p>Анализируем...</p>
    </div>
  </div>

  <!-- Errors -->
  <div class="error-banner" id="error-banner"></div>
  <div class="info-banner" id="info-banner"></div>

  <!-- Controls -->
  <div class="glass controls">

    <!-- Preset swatches -->
    <div>
      <div class="controls-label">Готовые оттенки</div>
      <div class="presets-row" id="presets-row"></div>
    </div>

    <!-- Custom color picker -->
    <div class="color-picker-wrap">
      <div class="controls-label">Свой цвет</div>
      <!-- SL square -->
      <canvas id="sl-canvas"></canvas>
      <!-- Hue strip -->
      <canvas id="hue-canvas"></canvas>
      <!-- Preview -->
      <div class="picker-preview-row">
        <div class="picker-preview-swatch" id="picker-swatch"></div>
        <span class="picker-hex" id="picker-hex">#B84040</span>
      </div>
    </div>

    <!-- Intensity -->
    <div class="slider-row">
      <div class="slider-header">
        <div class="controls-label" style="margin-bottom:0">Интенсивность</div>
        <span class="slider-val" id="opacity-val">60%</span>
      </div>
      <input type="range" id="opacity-slider" min="20" max="90" step="5" value="60" />
    </div>

    <!-- Gloss -->
    <div class="slider-row">
      <div class="slider-header">
        <div class="controls-label" style="margin-bottom:0">Блеск</div>
        <span class="slider-val" id="gloss-val">30%</span>
      </div>
      <input type="range" id="gloss-slider" min="0" max="100" step="5" value="30" />
    </div>

    <!-- CTA inside controls (desktop) -->
    <a class="cta-btn cta-btn-inner" href="https://b918851.yclients.com/company/167253/record-type?" target="_blank" rel="noopener">
      Записаться на макияж <span style="font-size:18px">→</span>
    </a>
  </div>

  <!-- CTA outside controls (mobile) -->
  <a class="cta-btn" href="https://b918851.yclients.com/company/167253/record-type?" target="_blank" rel="noopener">
    Записаться на макияж
    <span class="cta-arrow">→</span>
  </a>

</div>

<script type="module">
import { FaceLandmarker, FilesetResolver } from
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ─── Lip landmark indices (MediaPipe 478-point mesh) ───
const OUTER = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
const INNER = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];

const PRESETS = [
  '#C8A882','#D4856A','#C4624A','#B84040',
  '#8B2252','#6B1F3A','#E8758A','#FF6AD5',
  '#C840AA','#D4506B','#9B3060','#5C1F3A',
];

// ─── State ───
const state = {
  color:   '#B84040',
  opacity: 0.6,
  gloss:   0.3,
  mode:    'camera',
  lastLandmarks: null,
  frameCount: 0,
  detecting: false,
};

// ─── DOM refs ───
const video         = document.getElementById('video');
const camCanvas     = document.getElementById('camera-canvas');
const camCtx        = camCanvas.getContext('2d');
const photoCanvas   = document.getElementById('photo-canvas');
const photoCtx      = photoCanvas.getContext('2d');
const opacitySlider = document.getElementById('opacity-slider');
const glossSlider   = document.getElementById('gloss-slider');
const opacityVal    = document.getElementById('opacity-val');
const glossVal      = document.getElementById('gloss-val');
const fileInput     = document.getElementById('file-input');
const errorBanner   = document.getElementById('error-banner');
const infoBanner    = document.getElementById('info-banner');
const camLoading    = document.getElementById('camera-loading');
const photoLoading  = document.getElementById('photo-loading');
const detectHint    = document.getElementById('detect-hint');
const photoArea     = document.getElementById('photo-area');
const photoPlaceholder = document.getElementById('photo-placeholder');

// ─── HSL color picker ───
const slCanvas   = document.getElementById('sl-canvas');
const slCtx      = slCanvas.getContext('2d');
const hueCanvas  = document.getElementById('hue-canvas');
const hueCtx     = hueCanvas.getContext('2d');
const pickerSwatch = document.getElementById('picker-swatch');
const pickerHex  = document.getElementById('picker-hex');

// Current hue (0-360), sat (0-1), light (0-1)
let pickerH = 0, pickerS = 0.7, pickerL = 0.4;

function hslToHex(h, s, l) {
  const a = s * Math.min(l, 1 - l);
  const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)); };
  return '#' + [f(0),f(8),f(4)].map(x => Math.round(x*255).toString(16).padStart(2,'0')).join('');
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    if (max===r) h=((g-b)/d+(g<b?6:0))/6;
    else if (max===g) h=((b-r)/d+2)/6;
    else h=((r-g)/d+4)/6;
  }
  return [h*360, s, l];
}

function drawSLSquare() {
  const w = slCanvas.width, h = slCanvas.height;
  // White → hue gradient (left-right)
  const gradH = slCtx.createLinearGradient(0,0,w,0);
  gradH.addColorStop(0, 'white');
  gradH.addColorStop(1, `hsl(${pickerH},100%,50%)`);
  slCtx.fillStyle = gradH;
  slCtx.fillRect(0,0,w,h);
  // Transparent → black (top-bottom)
  const gradV = slCtx.createLinearGradient(0,0,0,h);
  gradV.addColorStop(0, 'rgba(0,0,0,0)');
  gradV.addColorStop(1, 'black');
  slCtx.fillStyle = gradV;
  slCtx.fillRect(0,0,w,h);
  // Cursor
  // Convert HSL to SL square coords: x=S, y=1-L*(1/(1-S/2)) approx
  // Use simpler: sat maps to x, "value" maps to y where value=L+S*min(L,1-L)
  const v = pickerL + pickerS * Math.min(pickerL, 1-pickerL);
  const s2 = v > 0 ? 2*(1-pickerL/v) : 0;
  const cx = s2 * w, cy = (1-v) * h;
  slCtx.beginPath();
  slCtx.arc(cx, cy, 7, 0, Math.PI*2);
  slCtx.strokeStyle = '#fff';
  slCtx.lineWidth = 2.5;
  slCtx.stroke();
  slCtx.beginPath();
  slCtx.arc(cx, cy, 5, 0, Math.PI*2);
  slCtx.strokeStyle = 'rgba(0,0,0,.4)';
  slCtx.lineWidth = 1;
  slCtx.stroke();
}

function drawHueStrip() {
  const w = hueCanvas.width, h = hueCanvas.height;
  const grad = hueCtx.createLinearGradient(0,0,w,0);
  for (let i=0; i<=360; i+=30) grad.addColorStop(i/360, `hsl(${i},100%,50%)`);
  hueCtx.fillStyle = grad;
  hueCtx.fillRect(0,0,w,h);
  // Cursor
  const cx = (pickerH/360)*w;
  hueCtx.beginPath();
  hueCtx.arc(cx, h/2, h/2-1, 0, Math.PI*2);
  hueCtx.fillStyle = `hsl(${pickerH},100%,50%)`;
  hueCtx.fill();
  hueCtx.strokeStyle = '#fff';
  hueCtx.lineWidth = 2;
  hueCtx.stroke();
}

function updatePickerFromHSL() {
  const hex = hslToHex(pickerH, pickerS, pickerL);
  state.color = hex;
  pickerSwatch.style.background = hex;
  pickerHex.textContent = hex.toUpperCase();
  presetsRow.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
  drawSLSquare();
  drawHueStrip();
  if (state.mode === 'photo') redrawPhoto();
}

function resizePickerCanvases() {
  const w = slCanvas.parentElement.clientWidth - 36;
  slCanvas.width  = w; slCanvas.height = 160;
  hueCanvas.width = w; hueCanvas.height = 22;
  updatePickerFromHSL();
}

// SL square interaction
function slPointer(e) {
  const r = slCanvas.getBoundingClientRect();
  const x = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
  const y = Math.max(0, Math.min(1, (e.clientY-r.top)/r.height));
  // Convert (x=saturation, y=value) → HSL
  const v = 1 - y;
  const s = x;
  pickerL = v * (1 - s/2);
  pickerS = pickerL === 0 || pickerL === 1 ? 0 : (v - pickerL) / Math.min(pickerL, 1-pickerL);
  updatePickerFromHSL();
}
let slDragging = false;
slCanvas.addEventListener('pointerdown', e => { slDragging=true; slCanvas.setPointerCapture(e.pointerId); slPointer(e); });
slCanvas.addEventListener('pointermove', e => { if(slDragging) slPointer(e); });
slCanvas.addEventListener('pointerup', () => slDragging=false);

// Hue strip interaction
function huePointer(e) {
  const r = hueCanvas.getBoundingClientRect();
  pickerH = Math.max(0, Math.min(360, ((e.clientX-r.left)/r.width)*360));
  updatePickerFromHSL();
}
let hueDragging = false;
hueCanvas.addEventListener('pointerdown', e => { hueDragging=true; hueCanvas.setPointerCapture(e.pointerId); huePointer(e); });
hueCanvas.addEventListener('pointermove', e => { if(hueDragging) huePointer(e); });
hueCanvas.addEventListener('pointerup', () => hueDragging=false);

// ─── Build color presets ───
const presetsRow = document.getElementById('presets-row');
PRESETS.forEach(hex => {
  const dot = document.createElement('div');
  dot.className = 'preset-dot';
  dot.style.background = hex;
  dot.title = hex;
  dot.onclick = () => {
    [pickerH, pickerS, pickerL] = hexToHsl(hex);
    presetsRow.querySelectorAll('.preset-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    updatePickerFromHSL();
  };
  presetsRow.appendChild(dot);
});

// Init picker with default color
;[pickerH, pickerS, pickerL] = hexToHsl(state.color);
requestAnimationFrame(resizePickerCanvases);
window.addEventListener('resize', resizePickerCanvases);

opacitySlider.addEventListener('input', () => {
  state.opacity = opacitySlider.value / 100;
  opacityVal.textContent = opacitySlider.value + '%';
  if (state.mode === 'photo') redrawPhoto();
});

glossSlider.addEventListener('input', () => {
  state.gloss = glossSlider.value / 100;
  glossVal.textContent = glossSlider.value + '%';
  if (state.mode === 'photo') redrawPhoto();
});

// ─── MediaPipe init ───
let faceLandmarker = null;

async function initMediaPipe() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numFaces: 1,
      minFaceDetectionConfidence: 0.5,
      minFacePresenceConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    return true;
  } catch (e) {
    console.error('MediaPipe init error:', e);
    showError('Не удалось загрузить модель обнаружения лица. Проверьте подключение к интернету.');
    return false;
  }
}

// ─── Camera ───
async function startCamera() {
  camLoading.classList.remove('hidden');

  const ok = await initMediaPipe();
  if (!ok) { camLoading.classList.add('hidden'); return; }

  if (!location.protocol.startsWith('https') && location.hostname !== 'localhost') {
    camLoading.classList.add('hidden');
    showError('Камера требует HTTPS. Используй режим «Фото» или открой страницу через защищённое соединение.');
    switchTab('photo');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 854 } }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    camCanvas.width  = video.videoWidth;
    camCanvas.height = video.videoHeight;
    camLoading.classList.add('hidden');
    requestAnimationFrame(cameraLoop);
  } catch (e) {
    camLoading.classList.add('hidden');
    showError('Камера недоступна или доступ запрещён. Используй режим «Фото».');
    switchTab('photo');
  }
}

function cameraLoop(ts) {
  if (state.mode !== 'camera') return;
  requestAnimationFrame(cameraLoop);

  const w = camCanvas.width, h = camCanvas.height;
  camCtx.clearRect(0, 0, w, h);

  // Mirror video (selfie)
  camCtx.save();
  camCtx.scale(-1, 1);
  camCtx.drawImage(video, -w, 0, w, h);
  camCtx.restore();

  state.frameCount++;

  // Detect every 3 frames
  if (state.frameCount % 3 === 0 && faceLandmarker && !state.detecting) {
    state.detecting = true;
    try {
      const result = faceLandmarker.detectForVideo(video, ts);
      if (result.faceLandmarks && result.faceLandmarks.length > 0) {
        // Mirror X coordinates
        state.lastLandmarks = result.faceLandmarks[0].map(pt => ({
          x: 1 - pt.x, y: pt.y, z: pt.z
        }));
        detectHint.style.display = 'none';
      } else {
        detectHint.style.display = 'block';
      }
    } catch {}
    state.detecting = false;
  }

  if (state.lastLandmarks) {
    drawLipColor(camCtx, state.lastLandmarks, w, h);
  }
}

// ─── Photo mode ───
let photoImage = null;

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  photoLoading.classList.remove('hidden');
  photoPlaceholder.style.display = 'none';
  photoCanvas.classList.add('hidden');

  photoImage = await loadImage(file);

  // Switch landmarker to IMAGE mode
  if (!faceLandmarker) {
    const ok = await initMediaPipeImage();
    if (!ok) { photoLoading.classList.add('hidden'); return; }
  } else {
    try {
      await faceLandmarker.setOptions({ runningMode: 'IMAGE' });
    } catch {}
  }

  // Size canvas to image
  const maxW = photoArea.clientWidth;
  const scale = Math.min(maxW / photoImage.width, 1);
  photoCanvas.width  = photoImage.width  * scale;
  photoCanvas.height = photoImage.height * scale;

  try {
    const result = faceLandmarker.detect(photoImage);
    if (result.faceLandmarks && result.faceLandmarks.length > 0) {
      state.lastPhotoLandmarks = result.faceLandmarks[0];
      redrawPhoto();
      photoCanvas.classList.remove('hidden');
    } else {
      showError('Лицо не обнаружено. Попробуй другое фото с хорошим освещением.');
      photoPlaceholder.style.display = 'flex';
    }
  } catch (e) {
    showError('Ошибка при обработке фото: ' + e.message);
    photoPlaceholder.style.display = 'flex';
  }

  photoLoading.classList.add('hidden');

  // Switch back to VIDEO mode for camera
  try { await faceLandmarker.setOptions({ runningMode: 'VIDEO' }); } catch {}
});

function redrawPhoto() {
  if (!photoImage || !state.lastPhotoLandmarks) return;
  photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
  photoCtx.drawImage(photoImage, 0, 0, photoCanvas.width, photoCanvas.height);
  drawLipColor(photoCtx, state.lastPhotoLandmarks, photoCanvas.width, photoCanvas.height);
}

async function initMediaPipeImage() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'IMAGE',
      numFaces: 1,
    });
    return true;
  } catch {
    showError('Не удалось загрузить модель. Проверьте подключение.');
    return false;
  }
}

function loadImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = URL.createObjectURL(file);
  });
}

// ─── Draw lip color ───
// Offscreen canvas for soft-edge lip mask
const offscreen = document.createElement('canvas');
const offCtx = offscreen.getContext('2d');

function buildLipPath(landmarks, w, h) {
  const path = new Path2D();
  OUTER.forEach((idx, i) => {
    const pt = landmarks[idx];
    i === 0 ? path.moveTo(pt.x*w, pt.y*h) : path.lineTo(pt.x*w, pt.y*h);
  });
  path.closePath();
  INNER.forEach((idx, i) => {
    const pt = landmarks[idx];
    i === 0 ? path.moveTo(pt.x*w, pt.y*h) : path.lineTo(pt.x*w, pt.y*h);
  });
  path.closePath();
  return path;
}

function drawLipColor(ctx, landmarks, w, h) {
  // Step 1: draw color mask on offscreen canvas with soft edges
  offscreen.width = w; offscreen.height = h;
  offCtx.clearRect(0, 0, w, h);

  // Fill lip shape
  offCtx.save();
  offCtx.clip(buildLipPath(landmarks, w, h), 'evenodd');
  offCtx.fillStyle = state.color;
  offCtx.fillRect(0, 0, w, h);
  offCtx.restore();

  // Soften edges with blur (natural makeup look, no hard border)
  offCtx.filter = 'blur(2px)';
  const temp = document.createElement('canvas');
  temp.width = w; temp.height = h;
  const tCtx = temp.getContext('2d');
  tCtx.drawImage(offscreen, 0, 0);
  offCtx.filter = 'none';
  offCtx.clearRect(0, 0, w, h);
  offCtx.drawImage(temp, 0, 0);

  // Step 2: composite onto main canvas
  // "color" mode: takes hue+saturation from source, keeps luminosity of destination
  // = changes lip color while preserving skin texture, shadows, highlights
  ctx.save();
  ctx.globalCompositeOperation = 'color';
  ctx.globalAlpha = state.opacity;
  ctx.drawImage(offscreen, 0, 0);

  // Step 3: gloss — soft radial highlight on upper lip
  if (state.gloss > 0.02) {
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = state.gloss * 0.7;
    const cx = landmarks[13].x * w;
    const cy = (landmarks[13].y * h) - 3;
    const r  = Math.max(w, h) * 0.04;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy + r * 0.5, r * 2.5);
    grad.addColorStop(0, `rgba(255,255,255,${state.gloss * 0.75})`);
    grad.addColorStop(0.5, `rgba(255,255,255,${state.gloss * 0.2})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 1;
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }

  ctx.restore();
}

// ─── Tab switching ───
window.switchTab = function(mode) {
  state.mode = mode;
  document.getElementById('tab-camera').classList.toggle('active', mode === 'camera');
  document.getElementById('tab-photo').classList.toggle('active', mode === 'photo');
  document.getElementById('section-camera').classList.toggle('hidden', mode !== 'camera');
  document.getElementById('section-photo').classList.toggle('hidden', mode !== 'photo');
  clearError();

  if (mode === 'camera' && !video.srcObject) {
    startCamera();
  }
};

// ─── Helpers ───
function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('show');
}
function clearError() {
  errorBanner.classList.remove('show');
}

// ─── Selfie ──────────────────────────────────────────────────
async function takeSelfie() {
  const btn = document.getElementById('selfie-btn');
  btn.disabled = true;

  // Flash effect
  const flash = document.createElement('div');
  flash.className = 'flash-overlay';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 400);

  // Grab current canvas (camera mode)
  const src = document.getElementById('camera-canvas');
  if (!src || !src.width) { btn.disabled = false; return; }

  // Compose final image: canvas + MK watermark
  const out = document.createElement('canvas');
  out.width  = src.width;
  out.height = src.height;
  const ctx  = out.getContext('2d');

  // Draw current camera frame with lip color
  ctx.drawImage(src, 0, 0);

  // Watermark: top-right corner
  const pad  = Math.round(out.width * 0.04);
  const size = Math.round(out.width * 0.05);

  ctx.save();
  // Semi-transparent pill background
  const text = 'MAKEUP KITCHEN';
  ctx.font = `600 ${size}px Montserrat, sans-serif`;
  const tw = ctx.measureText(text).width;
  const bw = tw + pad * 1.4, bh = size * 1.6;
  const bx = out.width - bw - pad, by = pad;
  ctx.fillStyle = 'rgba(60,14,44,0.55)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, bh / 2);
  ctx.fill();
  // Text
  ctx.fillStyle = '#ffb9e7';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, bx + pad * 0.7, by + bh / 2);
  ctx.restore();

  // Convert canvas to blob via atob (works in all browsers including Safari)
  function dataUrlToBlob(dataUrl) {
    const parts = dataUrl.split(',');
    const mime  = parts[0].match(/:(.*?);/)[1];
    const raw   = atob(parts[1]);
    const arr   = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    return new Blob([arr], { type: mime });
  }

  try {
    const dataUrl = out.toDataURL('image/jpeg', 0.93);
    const blob = dataUrlToBlob(dataUrl);
    const file = new File([blob], 'makeup-kitchen-selfie.jpg', { type: 'image/jpeg' });

    let shared = false;
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'Мой цвет губ — Makeup Kitchen',
          text: 'Примерила цвет губ в Makeup Kitchen 💄',
        });
        shared = true;
      } catch (e) {
        if (e.name === 'AbortError') shared = true; // user cancelled — not an error
      }
    }
    if (!shared) downloadImage(out);
  } catch (e) {
    downloadImage(out);
  }
  btn.disabled = false;
}

function downloadImage(canvas) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/jpeg', 0.93);
  a.download = 'makeup-kitchen-selfie.jpg';
  a.click();
}

startCamera();
