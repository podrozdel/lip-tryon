<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Примерка цвета губ — Makeup Kitchen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:     #3c0e2c;
      --accent:    #cf66ab;
      --accent-lt: #ffb9e7;
      --bg:        #fff5f5;
      --card-bg:   #ffffff;
      --card-bd:   #f0d6e8;
      --text:      #3c0e2c;
      --text-muted:#ac799a;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px 40px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    @media (min-width: 768px) {
      html, body { height: 100%; }
      body { padding: 40px 32px 48px; align-items: center; min-height: 100vh; }
      .app {
        max-width: 960px;
        display: grid;
        grid-template-columns: 1fr 400px;
        grid-template-rows: auto auto 1fr auto;
        gap: 20px;
        align-items: start;
      }
      .header        { grid-column: 1 / -1; text-align: left; padding: 0; display: flex; align-items: baseline; gap: 20px; }
      .header h1     { font-size: 36px; }
      .header-logo   { font-size: 12px; margin-bottom: 0; flex-shrink: 0; }
      .tabs          { grid-column: 1; grid-row: 2; }
      #section-camera,
      #section-photo { grid-column: 1; grid-row: 3; }
      .error-banner  { grid-column: 1; grid-row: 4; }
      .glass.controls { grid-column: 2; grid-row: 2 / 5; }
      .cta-btn       { grid-column: 2; grid-row: 5; }
      .viewport, .photo-area { aspect-ratio: 4/5; }
    }

    .header { text-align: center; padding: 4px 0 6px; }
    .header-logo {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--accent); margin-bottom: 8px;
    }
    .header h1 { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 300; line-height: 1.25; color: var(--brand); }
    .header h1 em { color: var(--accent); font-style: normal; font-weight: 600; }

    .tabs {
      display: flex; background: #fff;
      border: 1.5px solid var(--card-bd); border-radius: 50px; padding: 4px; gap: 4px;
    }
    .tab {
      flex: 1; text-align: center; padding: 9px 0; border-radius: 50px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s;
      color: var(--text-muted); border: none; background: transparent; font-family: 'Manrope', sans-serif;
    }
    .tab.active { background: var(--brand); color: #fff; }

    .glass { background: var(--card-bg); border: 1.5px solid var(--card-bd); border-radius: 20px; }

    .viewport {
      position: relative; width: 100%; aspect-ratio: 3/4;
      border-radius: 20px; overflow: hidden; background: #f0d6e8;
    }
    /* jeeliz canvas fills viewport */
    #jeeliz-canvas {
      position: absolute; inset: 0; width: 100% !important; height: 100% !important;
      object-fit: cover; transform: scaleX(-1);
    }
    /* overlay canvas for lip color */
    #overlay-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 2; transform: scaleX(-1);
    }

    .photo-area {
      position: relative; width: 100%; aspect-ratio: 3/4;
      border-radius: 20px; overflow: hidden; background: #f0d6e8;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-area canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: var(--text-muted); z-index: 1; }
    .photo-placeholder span { font-size: 40px; }
    .photo-placeholder p { font-size: 13px; }

    .upload-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 24px; border-radius: 50px; font-size: 13px; font-weight: 600;
      cursor: pointer; background: var(--brand); color: #fff; border: none;
      font-family: 'Manrope', sans-serif; transition: opacity .15s, transform .15s;
    }
    .upload-btn:active { transform: scale(0.97); opacity: .88; }

    .loading-overlay {
      position: absolute; inset: 0;
      background: rgba(255,245,245,0.8); backdrop-filter: blur(4px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 10; border-radius: 20px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--card-bd); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay p { font-size: 13px; color: var(--text-muted); }

    .controls { padding: 18px; display: flex; flex-direction: column; gap: 18px; }
    .controls-label {
      font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px;
    }

    .presets-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .preset-dot {
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent; transition: transform .15s, border-color .15s;
      flex-shrink: 0; box-shadow: 0 2px 6px rgba(60,14,44,.15);
    }
    .preset-dot.active { border-color: var(--brand); transform: scale(1.18); }

    .color-picker-wrap { display: flex; flex-direction: column; gap: 10px; }
    .picker-preview-row { display: flex; align-items: center; gap: 12px; }
    .picker-preview-swatch {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2.5px solid var(--card-bd); flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(60,14,44,.15);
    }
    .picker-hex { font-size: 13px; font-weight: 600; color: var(--text-muted); font-family: 'Montserrat', monospace; letter-spacing: 1px; }
    #sl-canvas { width: 100%; height: 160px; border-radius: 12px; cursor: crosshair; touch-action: none; display: block; border: 1px solid var(--card-bd); }
    #hue-canvas { width: 100%; height: 22px; border-radius: 11px; cursor: crosshair; touch-action: none; display: block; border: 1px solid var(--card-bd); }

    .slider-row { display: flex; flex-direction: column; gap: 8px; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; }
    .slider-val { font-size: 12px; font-weight: 700; color: var(--accent); font-family: 'Montserrat', sans-serif; }
    input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: var(--card-bd); outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--brand); box-shadow: 0 2px 6px rgba(60,14,44,.25); cursor: pointer; border: 2px solid #fff; }

    .error-banner { background: #fff0f0; border: 1.5px solid #f5c0c0; border-radius: 14px; padding: 12px 16px; font-size: 13px; color: #a03030; display: none; }
    .error-banner.show { display: block; }

    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 16px; border-radius: 50px; font-size: 15px; font-weight: 600;
      text-decoration: none; color: #fff; background: var(--brand);
      font-family: 'Montserrat', sans-serif; letter-spacing: 0.5px;
      transition: opacity .15s, transform .15s;
    }
    .cta-btn:active { transform: scale(0.98); opacity: .88; }

    .detect-hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(60,14,44,.6); backdrop-filter: blur(8px);
      border-radius: 20px; padding: 6px 14px; font-size: 11px;
      color: rgba(255,255,255,.85); white-space: nowrap; z-index: 5; pointer-events: none;
    }
    .hidden { display: none !important; }

    /* Version badge */
    .version-badge {
      position: fixed; bottom: 12px; right: 12px; z-index: 100;
      background: var(--brand); color: #fff; font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 20px; opacity: 0.7;
    }
  </style>

<body>

<!-- jeeliz + TF.js face landmarks for precise lip points -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.5/dist/face-landmarks-detection.js"></script>

<script>
const PRESETS = [
  '#C8A882','#D4856A','#C4624A','#B84040',
  '#8B2252','#6B1F3A','#E8758A','#FF6AD5',
  '#C840AA','#D4506B','#9B3060','#5C1F3A',
];

// MediaFace Mesh lip indices (same 468-point mesh, TF.js uses same topology as MediaPipe)
const OUTER = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146];
const INNER = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];

const state = { color: '#B84040', opacity: 0.6, gloss: 0.3, mode: 'camera' };

// DOM
const overlayCanvas = document.getElementById('overlay-canvas');
const overlayCtx    = overlayCanvas.getContext('2d');
const photoCanvas   = document.getElementById('photo-canvas');
const photoCtx      = photoCanvas.getContext('2d');
const opacitySlider = document.getElementById('opacity-slider');
const glossSlider   = document.getElementById('gloss-slider');
const opacityVal    = document.getElementById('opacity-val');
const glossVal      = document.getElementById('gloss-val');
const fileInput     = document.getElementById('file-input');
const errorBanner   = document.getElementById('error-banner');
const camLoading    = document.getElementById('camera-loading');
const detectHint    = document.getElementById('detect-hint');
const photoPlaceholder = document.getElementById('photo-placeholder');

opacitySlider.addEventListener('input', () => { state.opacity = opacitySlider.value/100; opacityVal.textContent = opacitySlider.value+'%'; if(state.mode==='photo') redrawPhoto(); });
glossSlider.addEventListener('input',   () => { state.gloss   = glossSlider.value/100;   glossVal.textContent   = glossSlider.value+'%';   if(state.mode==='photo') redrawPhoto(); });

// ─── HSL Picker ───
const slCanvas  = document.getElementById('sl-canvas');
const slCtx     = slCanvas.getContext('2d');
const hueCanvas = document.getElementById('hue-canvas');
const hueCtx    = hueCanvas.getContext('2d');
const pickerSwatch = document.getElementById('picker-swatch');
const pickerHex    = document.getElementById('picker-hex');
let pickerH = 0, pickerS = 0.7, pickerL = 0.4;

function hslToHex(h,s,l){const a=s*Math.min(l,1-l);const f=n=>{const k=(n+h/30)%12;return l-a*Math.max(-1,Math.min(k-3,9-k,1));};return'#'+[f(0),f(8),f(4)].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');}
function hexToHsl(hex){let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h=0,s=0,l=(max+min)/2;if(max!==min){const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);if(max===r)h=((g-b)/d+(g<b?6:0))/6;else if(max===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}return[h*360,s,l];}

function drawSLSquare(){const w=slCanvas.width,h=slCanvas.height;const gH=slCtx.createLinearGradient(0,0,w,0);gH.addColorStop(0,'white');gH.addColorStop(1,`hsl(${pickerH},100%,50%)`);slCtx.fillStyle=gH;slCtx.fillRect(0,0,w,h);const gV=slCtx.createLinearGradient(0,0,0,h);gV.addColorStop(0,'rgba(0,0,0,0)');gV.addColorStop(1,'black');slCtx.fillStyle=gV;slCtx.fillRect(0,0,w,h);const v=pickerL+pickerS*Math.min(pickerL,1-pickerL);const s2=v>0?2*(1-pickerL/v):0;const cx=s2*w,cy=(1-v)*h;slCtx.beginPath();slCtx.arc(cx,cy,7,0,Math.PI*2);slCtx.strokeStyle='#fff';slCtx.lineWidth=2.5;slCtx.stroke();slCtx.beginPath();slCtx.arc(cx,cy,5,0,Math.PI*2);slCtx.strokeStyle='rgba(0,0,0,.4)';slCtx.lineWidth=1;slCtx.stroke();}
function drawHueStrip(){const w=hueCanvas.width,h=hueCanvas.height;const g=hueCtx.createLinearGradient(0,0,w,0);for(let i=0;i<=360;i+=30)g.addColorStop(i/360,`hsl(${i},100%,50%)`);hueCtx.fillStyle=g;hueCtx.fillRect(0,0,w,h);const cx=(pickerH/360)*w;hueCtx.beginPath();hueCtx.arc(cx,h/2,h/2-1,0,Math.PI*2);hueCtx.fillStyle=`hsl(${pickerH},100%,50%)`;hueCtx.fill();hueCtx.strokeStyle='#fff';hueCtx.lineWidth=2;hueCtx.stroke();}

function updatePickerFromHSL(){const hex=hslToHex(pickerH,pickerS,pickerL);state.color=hex;pickerSwatch.style.background=hex;pickerHex.textContent=hex.toUpperCase();document.querySelectorAll('.preset-dot').forEach(d=>d.classList.remove('active'));drawSLSquare();drawHueStrip();if(state.mode==='photo')redrawPhoto();}
function resizePickerCanvases(){const w=slCanvas.parentElement.clientWidth-36;slCanvas.width=w;slCanvas.height=160;hueCanvas.width=w;hueCanvas.height=22;updatePickerFromHSL();}

let slDragging=false,hueDragging=false;
function slPointer(e){const r=slCanvas.getBoundingClientRect();const x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));const y=Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));const v=1-y;const s=x;pickerL=v*(1-s/2);pickerS=pickerL===0||pickerL===1?0:(v-pickerL)/Math.min(pickerL,1-pickerL);updatePickerFromHSL();}
function huePointer(e){const r=hueCanvas.getBoundingClientRect();pickerH=Math.max(0,Math.min(360,((e.clientX-r.left)/r.width)*360));updatePickerFromHSL();}
slCanvas.addEventListener('pointerdown',e=>{slDragging=true;slCanvas.setPointerCapture(e.pointerId);slPointer(e);});
slCanvas.addEventListener('pointermove',e=>{if(slDragging)slPointer(e);});
slCanvas.addEventListener('pointerup',()=>slDragging=false);
hueCanvas.addEventListener('pointerdown',e=>{hueDragging=true;hueCanvas.setPointerCapture(e.pointerId);huePointer(e);});
hueCanvas.addEventListener('pointermove',e=>{if(hueDragging)huePointer(e);});
hueCanvas.addEventListener('pointerup',()=>hueDragging=false);

// Presets
const presetsRow = document.getElementById('presets-row');
PRESETS.forEach(hex=>{const dot=document.createElement('div');dot.className='preset-dot';dot.style.background=hex;dot.onclick=()=>{[pickerH,pickerS,pickerL]=hexToHsl(hex);document.querySelectorAll('.preset-dot').forEach(d=>d.classList.remove('active'));dot.classList.add('active');updatePickerFromHSL();};presetsRow.appendChild(dot);});
;[pickerH,pickerS,pickerL]=hexToHsl(state.color);
requestAnimationFrame(resizePickerCanvases);
window.addEventListener('resize',resizePickerCanvases);

// ─── Draw lip color ───
function drawLipColor(ctx, landmarks, w, h) {
  ctx.save();
  const path = new Path2D();
  OUTER.forEach((idx,i)=>{const pt=landmarks[idx];const x=pt.x*w,y=pt.y*h;i===0?path.moveTo(x,y):path.lineTo(x,y);});
  path.closePath();
  INNER.forEach((idx,i)=>{const pt=landmarks[idx];const x=pt.x*w,y=pt.y*h;i===0?path.moveTo(x,y):path.lineTo(x,y);});
  path.closePath();
  ctx.clip(path,'evenodd');
  ctx.globalCompositeOperation='multiply';
  ctx.globalAlpha=state.opacity;
  ctx.fillStyle=state.color;
  ctx.fillRect(0,0,w,h);
  if(state.gloss>0.02){const cx=landmarks[13].x*w;const cy=landmarks[13].y*h-3;const r=Math.max(w,h)*0.04;const grad=ctx.createRadialGradient(cx,cy,0,cx,cy+r*0.5,r*2.5);grad.addColorStop(0,`rgba(255,255,255,${state.gloss*0.75})`);grad.addColorStop(0.5,`rgba(255,255,255,${state.gloss*0.2})`);grad.addColorStop(1,'rgba(255,255,255,0)');ctx.globalCompositeOperation='screen';ctx.globalAlpha=1;ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);}
  ctx.restore();
}

// ─── TensorFlow.js Face Landmarks (468 points, same mesh as MediaPipe) ───
let detector = null;
let video = null;
let lastLandmarks = null;
let frameCount = 0;
let rafId = null;

async function initDetector() {
  const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
  const config = {
    runtime: 'tfjs',
    refineLandmarks: true,
    maxFaces: 1,
  };
  detector = await faceLandmarksDetection.createDetector(model, config);
}

async function startCamera() {
  camLoading.classList.remove('hidden');

  if (!location.protocol.startsWith('https') && location.hostname !== 'localhost') {
    camLoading.classList.add('hidden');
    showError('Камера требует HTTPS. Используй режим «Фото» или открой через защищённое соединение.');
    switchTab('photo'); return;
  }

  try {
    await initDetector();
  } catch(e) {
    camLoading.classList.add('hidden');
    showError('Не удалось загрузить модель: ' + e.message); return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 854 } }
    });
    video = document.createElement('video');
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true;
    await new Promise(r => video.onloadedmetadata = r);

    const vp = document.getElementById('camera-viewport');
    overlayCanvas.width  = video.videoWidth;
    overlayCanvas.height = video.videoHeight;

    camLoading.classList.add('hidden');
    rafId = requestAnimationFrame(cameraLoop);
  } catch(e) {
    camLoading.classList.add('hidden');
    showError('Камера недоступна. Используй режим «Фото».');
    switchTab('photo');
  }
}

async function cameraLoop(ts) {
  if (state.mode !== 'camera') return;
  rafId = requestAnimationFrame(cameraLoop);

  const w = overlayCanvas.width, h = overlayCanvas.height;
  overlayCtx.clearRect(0, 0, w, h);

  // Draw video mirrored onto overlay canvas background
  overlayCtx.save();
  overlayCtx.scale(-1, 1);
  overlayCtx.drawImage(video, -w, 0, w, h);
  overlayCtx.restore();

  frameCount++;
  if (frameCount % 4 === 0 && detector) {
    try {
      const faces = await detector.estimateFaces(video, { flipHorizontal: false });
      if (faces.length > 0) {
        const kp = faces[0].keypoints;
        // Normalize to 0-1 and mirror X
        lastLandmarks = kp.map(pt => ({ x: 1 - pt.x / video.videoWidth, y: pt.y / video.videoHeight }));
        detectHint.style.display = 'none';
      } else {
        detectHint.style.display = 'block';
      }
    } catch {}
  }

  if (lastLandmarks) {
    drawLipColor(overlayCtx, lastLandmarks, w, h);
  }
}

// ─── Photo mode ───
let photoImage = null;
let photoLandmarks = null;

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  photoPlaceholder.style.display = 'none';
  photoCanvas.classList.add('hidden');

  photoImage = await new Promise(r => { const img = new Image(); img.onload = () => r(img); img.src = URL.createObjectURL(file); });

  if (!detector) {
    try { await initDetector(); } catch(e) { showError('Не удалось загрузить модель.'); return; }
  }

  const maxW = document.getElementById('photo-area').clientWidth;
  const scale = Math.min(maxW / photoImage.width, 1);
  photoCanvas.width  = photoImage.width  * scale;
  photoCanvas.height = photoImage.height * scale;

  try {
    const faces = await detector.estimateFaces(photoImage, { flipHorizontal: false });
    if (faces.length > 0) {
      const kp = faces[0].keypoints;
      photoLandmarks = kp.map(pt => ({ x: pt.x / photoImage.width, y: pt.y / photoImage.height }));
      redrawPhoto();
      photoCanvas.classList.remove('hidden');
    } else {
      showError('Лицо не обнаружено. Попробуй другое фото.');
      photoPlaceholder.style.display = 'flex';
    }
  } catch(e) {
    showError('Ошибка: ' + e.message);
    photoPlaceholder.style.display = 'flex';
  }
});

function redrawPhoto() {
  if (!photoImage || !photoLandmarks) return;
  photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
  photoCtx.drawImage(photoImage, 0, 0, photoCanvas.width, photoCanvas.height);
  drawLipColor(photoCtx, photoLandmarks, photoCanvas.width, photoCanvas.height);
}

// ─── Tab switching ───
window.switchTab = function(mode) {
  state.mode = mode;
  document.getElementById('tab-camera').classList.toggle('active', mode==='camera');
  document.getElementById('tab-photo').classList.toggle('active',  mode==='photo');
  document.getElementById('section-camera').classList.toggle('hidden', mode!=='camera');
  document.getElementById('section-photo').classList.toggle('hidden',  mode!=='photo');
  clearError();
  if (mode==='camera' && !video) startCamera();
  if (mode==='photo' && rafId) { cancelAnimationFrame(rafId); rafId=null; }
};

function showError(msg) { errorBanner.textContent=msg; errorBanner.classList.add('show'); }
function clearError()   { errorBanner.classList.remove('show'); }

startCamera();
</script>
